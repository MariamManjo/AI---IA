<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Universe — Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0a08;
  --warm1:#1a1208;
  --warm2:#231808;
  --card:rgba(255,248,235,0.04);
  --card-hover:rgba(255,248,235,0.07);
  --border:rgba(245,158,11,0.15);
  --border2:rgba(245,158,11,0.3);
  --amber:#f59e0b;
  --orange:#f97316;
  --coral:#fb7185;
  --gold:#fbbf24;
  --cream:#fef3c7;
  --text:#fef9f0;
  --muted:#9d8b6e;
  --dim:#5c4f3a;
  --green:#34d399;
  --blue:#60a5fa;
  --purple:#a78bfa;
  --sidebar:72px;
  --radius:20px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex}

/* BG GLOW */
body::before{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,rgba(245,158,11,.08) 0%,transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-100px;right:-100px;width:600px;height:600px;background:radial-gradient(ellipse,rgba(249,115,22,.06) 0%,transparent 70%);pointer-events:none;z-index:0}

/* SIDEBAR */
#sb{
  width:var(--sidebar);min-width:var(--sidebar);
  background:rgba(255,248,235,0.03);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:20px 0;gap:4px;z-index:10;position:relative;
}
.sb-logo{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--amber);letter-spacing:2px;text-align:center;margin-bottom:16px;line-height:1.4}
.sb-logo span{display:block;font-size:18px;margin-bottom:4px}
.lvl-dot{
  width:46px;height:46px;border-radius:14px;border:1px solid var(--border);
  background:transparent;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1px;transition:all .2s;
  color:var(--dim);font-size:10px;font-weight:700;position:relative;
}
.lvl-dot:hover{background:var(--card);border-color:var(--border2);color:var(--muted)}
.lvl-dot.active{background:linear-gradient(135deg,rgba(245,158,11,.2),rgba(249,115,22,.15));border-color:var(--amber);color:var(--amber)}
.lvl-dot.done{border-color:rgba(52,211,153,.4);color:var(--green)}
.lvl-dot.done::after{content:'✓';position:absolute;top:-4px;right:-4px;width:14px;height:14px;background:var(--green);border-radius:50%;color:#000;font-size:9px;display:flex;align-items:center;justify-content:center}
.lvl-dot.locked{opacity:.3;cursor:not-allowed}
.lvl-dot .di{font-size:16px;line-height:1}
.lvl-dot .dn{font-size:9px;font-weight:700}
.sb-div{width:32px;height:1px;background:var(--border);margin:6px 0}
.xp-vert{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:auto;padding-top:16px;border-top:1px solid var(--border);width:100%}
.xp-bar-v{width:4px;height:80px;background:var(--warm2);border-radius:2px;position:relative;overflow:hidden}
.xp-bar-fill{position:absolute;bottom:0;width:100%;background:linear-gradient(0deg,var(--amber),var(--orange));border-radius:2px;transition:height .5s}
.xp-num-v{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.5px}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1}

/* TOPBAR */
#top{
  display:flex;align-items:center;gap:16px;
  padding:16px 32px;border-bottom:1px solid var(--border);
  background:rgba(12,10,8,.6);backdrop-filter:blur(20px);
}
#top-title{font-size:15px;font-weight:700;color:var(--text);flex:1}
.top-stat{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px 14px}
.top-stat .ts-n{font-size:18px;font-weight:800;color:var(--amber)}
.top-stat .ts-l{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.top-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:12px;cursor:pointer;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;transition:all .2s;letter-spacing:.3px}
.top-btn:hover{border-color:var(--amber);color:var(--amber)}

/* CONTENT */
#cnt{flex:1;overflow-y:auto;padding:40px 48px;scroll-behavior:smooth}
#cnt::-webkit-scrollbar{width:4px}
#cnt::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* HERO */
.hero{
  background:linear-gradient(135deg,rgba(245,158,11,.12) 0%,rgba(249,115,22,.08) 50%,rgba(251,113,133,.06) 100%);
  border:1px solid var(--border2);border-radius:28px;padding:48px;margin-bottom:32px;
  position:relative;overflow:hidden;
}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:300px;height:300px;background:radial-gradient(circle,rgba(245,158,11,.1),transparent 70%);pointer-events:none}
.hero-tag{font-size:11px;font-weight:700;color:var(--amber);letter-spacing:3px;text-transform:uppercase;margin-bottom:14px}
.hero h1{font-family:'Orbitron',sans-serif;font-size:42px;font-weight:900;line-height:1.1;margin-bottom:16px;background:linear-gradient(135deg,var(--text),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:16px;color:var(--muted);max-width:500px;line-height:1.6;margin-bottom:32px}
.kpi-row{display:flex;gap:16px;flex-wrap:wrap}
.kpi{background:rgba(255,248,235,.05);border:1px solid var(--border);border-radius:16px;padding:16px 20px;min-width:110px}
.kpi-n{font-size:28px;font-weight:900;color:var(--amber);line-height:1}
.kpi-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:4px;font-weight:600}

/* GRID LAYOUT */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.g1{margin-bottom:20px}

/* CARD */
.c{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;transition:all .2s}
.c:hover{background:var(--card-hover);border-color:var(--border2)}
.c-label{font-size:10px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.c-label::before{content:'';width:16px;height:2px;background:var(--amber);border-radius:1px}
.c-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px}
.c-sub{font-size:13px;color:var(--muted);line-height:1.6}

/* TIMELINE (minimal) */
.tl{display:flex;flex-direction:column;gap:0}
.tl-row{display:flex;gap:16px;padding:14px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.tl-row:last-child{border:none}
.tl-year{font-size:12px;font-weight:800;color:var(--amber);width:42px;flex-shrink:0;padding-top:2px}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--amber);flex-shrink:0;margin-top:5px}
.tl-dot.big{width:10px;height:10px;background:var(--gold);box-shadow:0 0 8px var(--amber)}
.tl-content .tt{font-size:13px;font-weight:600;color:var(--text)}
.tl-content .ts{font-size:12px;color:var(--muted);margin-top:2px}

/* STAT BLOCKS */
.stat-block{background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(249,115,22,.05));border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center}
.sb-big{font-size:40px;font-weight:900;color:var(--amber);line-height:1}
.sb-unit{font-size:14px;color:var(--muted);margin-top:6px;font-weight:600}
.sb-desc{font-size:11px;color:var(--dim);margin-top:4px}

/* TOKEN VIZ */
.token-stream{display:flex;flex-wrap:wrap;gap:4px;margin-top:14px}
.tok{padding:5px 10px;border-radius:8px;font-size:12px;font-family:'SF Mono','Fira Code',monospace;font-weight:600;border:1px solid;line-height:1}
.tok.t1{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.4);color:#fcd34d}
.tok.t2{background:rgba(249,115,22,.15);border-color:rgba(249,115,22,.4);color:#fdba74}
.tok.t3{background:rgba(251,113,133,.15);border-color:rgba(251,113,133,.4);color:#fda4af}
.tok.t4{background:rgba(167,139,250,.15);border-color:rgba(167,139,250,.4);color:#c4b5fd}
.tok.t5{background:rgba(96,165,250,.15);border-color:rgba(96,165,250,.4);color:#93c5fd}
.tok.t6{background:rgba(52,211,153,.15);border-color:rgba(52,211,153,.4);color:#6ee7b7}
.tok-id{font-size:8px;color:var(--dim);text-align:center;margin-top:2px;display:block}
.tok-wrap{display:flex;flex-direction:column;align-items:center}

/* FRAMEWORK CARDS */
.fw-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;transition:all .2s}
.fw-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.fw-icon{font-size:28px;margin-bottom:10px}
.fw-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.fw-tag{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3);margin-bottom:8px}
.fw-desc{font-size:12px;color:var(--muted);line-height:1.5}

/* PIPELINE */
.pipe{display:flex;align-items:center;gap:0;flex-wrap:nowrap;overflow-x:auto;padding:4px 0}
.pipe::-webkit-scrollbar{height:3px}
.pipe::-webkit-scrollbar-thumb{background:var(--border)}
.p-node{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:12px;font-weight:600;color:var(--text);text-align:center;min-width:90px}
.p-node.accent{background:rgba(245,158,11,.12);border-color:var(--amber);color:var(--gold)}
.p-node.purple{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.4);color:#c4b5fd}
.p-node.green{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.4);color:var(--green)}
.p-node small{display:block;font-size:10px;font-weight:400;opacity:.7;margin-top:2px}
.p-arr{flex-shrink:0;color:var(--amber);font-size:16px;padding:0 6px;opacity:.6}

/* AGENT LOOP */
.agent-loop{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.al-step{display:flex;align-items:flex-start;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
.al-num{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}
.al-step:nth-child(1) .al-num{background:rgba(245,158,11,.2);color:var(--amber)}
.al-step:nth-child(2) .al-num{background:rgba(167,139,250,.2);color:#c4b5fd}
.al-step:nth-child(3) .al-num{background:rgba(249,115,22,.2);color:#fdba74}
.al-step:nth-child(4) .al-num{background:rgba(52,211,153,.2);color:var(--green)}
.al-t{font-size:13px;font-weight:700;color:var(--text)}
.al-s{font-size:11px;color:var(--muted);margin-top:2px}

/* COMPARE TABLE */
.ctbl{width:100%;border-collapse:collapse;font-size:12px}
.ctbl th{padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--amber);border-bottom:1px solid var(--border)}
.ctbl td{padding:10px 14px;border-bottom:1px solid rgba(255,248,235,.04);color:var(--muted)}
.ctbl td:first-child{color:var(--text);font-weight:600}
.ctbl tr:last-child td{border:none}
.ctbl tr:hover td{background:rgba(255,248,235,.02)}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.pill.g{background:rgba(52,211,153,.15);color:var(--green)}
.pill.a{background:rgba(245,158,11,.15);color:var(--amber)}
.pill.r{background:rgba(251,113,133,.15);color:var(--coral)}

/* CODE */
.code{background:#0d0a06;border:1px solid var(--border);border-radius:14px;padding:20px;font-family:'SF Mono','Fira Code',monospace;font-size:12px;line-height:1.8;overflow-x:auto}
.kw{color:#f97316}.str{color:#fbbf24}.cm{color:#5c4f3a}.fn{color:#a78bfa}.num{color:#34d399}

/* QUIZ */
.quiz{background:linear-gradient(135deg,rgba(245,158,11,.06),rgba(249,115,22,.04));border:1px solid var(--border2);border-radius:var(--radius);padding:32px;margin-top:8px}
.quiz-h{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px;color:var(--text)}
.quiz-sub{font-size:12px;color:var(--muted);margin-bottom:28px}
.q{margin-bottom:24px}
.q-text{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;line-height:1.5}
.q-n{color:var(--amber);margin-right:6px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{background:rgba(255,248,235,.03);border:1px solid var(--border);color:var(--muted);padding:11px 16px;border-radius:12px;text-align:left;cursor:pointer;font-size:13px;font-family:'Inter',sans-serif;transition:all .2s;font-weight:500}
.opt:hover{border-color:var(--amber);color:var(--text);background:rgba(245,158,11,.06)}
.opt.correct{background:rgba(52,211,153,.1);border-color:var(--green);color:var(--green)}
.opt.wrong{background:rgba(251,113,133,.1);border-color:var(--coral);color:var(--coral)}
.opt.disabled{cursor:not-allowed}
.exp{font-size:12px;color:var(--muted);background:rgba(245,158,11,.05);border-left:2px solid var(--amber);padding:10px 14px;border-radius:0 10px 10px 0;margin-top:8px;display:none;line-height:1.6}
.exp.show{display:block}
.quiz-foot{display:flex;align-items:center;gap:16px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.btn{background:linear-gradient(135deg,var(--amber),var(--orange));color:#0c0a08;border:none;padding:12px 28px;border-radius:12px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:.3px;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.3;cursor:not-allowed}
.q-score{font-size:13px;color:var(--muted);font-weight:600}

/* CHART */
.ch{position:relative;height:240px}

/* SLIDER */
.slider-wrap{margin-top:16px}
.slider-wrap label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:8px}
.slider-wrap input[type=range]{width:100%;accent-color:var(--amber);height:4px}
.slider-out{background:rgba(255,248,235,.03);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-top:12px;font-size:13px;color:var(--text);line-height:1.7;min-height:60px}

/* TOKEN INPUT */
.tok-input{width:100%;background:rgba(255,248,235,.03);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:12px;font-size:14px;outline:none;font-family:'SF Mono','Fira Code',monospace;margin-bottom:14px;transition:border .2s}
.tok-input:focus{border-color:var(--amber)}
.tok-meta{font-size:11px;color:var(--dim);margin-top:10px;font-weight:600}

/* LOCKED */
.locked-pg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;text-align:center}
.lock-icon{font-size:72px;opacity:.3}
.locked-pg h2{font-size:22px;font-weight:700}
.locked-pg p{color:var(--muted);font-size:14px}

/* ANIMATION */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.hero,.g2,.g3,.g1{animation:fadeUp .4s ease both}
.g2{animation-delay:.05s}.g3{animation-delay:.1s}

/* MEMORY TYPES */
.mem-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center;transition:all .2s}
.mem-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.mem-icon{font-size:32px;margin-bottom:10px}
.mem-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.mem-badge{font-size:10px;font-weight:700;color:var(--amber);background:rgba(245,158,11,.1);padding:2px 8px;border-radius:6px;display:inline-block;margin-bottom:8px}
.mem-desc{font-size:11px;color:var(--muted);line-height:1.5}

/* TOAST */
#toast{position:fixed;bottom:28px;right:28px;background:rgba(12,10,8,.95);border:1px solid var(--amber);color:var(--amber);padding:12px 20px;border-radius:14px;font-size:13px;font-weight:700;z-index:999;transform:translateY(80px);transition:transform .3s;pointer-events:none;backdrop-filter:blur(20px)}
#toast.show{transform:translateY(0)}
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sb">
  <div class="sb-logo"><span>⚡</span>AI</div>
  <div id="sb-levels"></div>
  <div class="xp-vert">
    <div class="xp-bar-v"><div class="xp-bar-fill" id="xpfill" style="height:0%"></div></div>
    <div class="xp-num-v" id="xpnum">0 XP</div>
  </div>
</nav>

<!-- MAIN -->
<div id="main">
  <div id="top">
    <div id="top-title">AI Universe</div>
    <div class="top-stat"><span class="ts-n" id="xp-top">0</span><span class="ts-l">XP</span></div>
    <div class="top-stat"><span class="ts-n" id="streak-top">🔥1</span><span class="ts-l">Streak</span></div>
    <div class="top-stat"><span class="ts-n" id="done-top">0/10</span><span class="ts-l">Done</span></div>

  </div>
  <div id="cnt"></div>
</div>

<div id="toast"></div>

<script>
const ICONS=['🧠','📈','💬','👁','🔍','🤖','💾','🔧','🔄','🚀'];
const NAMES=['AI Fundamentals','Predictive AI','Prompt Eng.','Hallucinations','RAG Platforms','Agentic AI','Memory','Tool Use','Multi-step','Deploy'];
const COLORS=['#f59e0b','#34d399','#a78bfa','#fb7185','#60a5fa','#f97316','#ec4899','#84cc16','#06b6d4','#fbbf24'];

// State
const GS=(()=>{const d={xp:0,done:[],scores:{},streak:1};try{return{...d,...JSON.parse(localStorage.getItem('aig2')||'{}')};}catch{return d;}})();
const save=()=>{try{localStorage.setItem('aig2',JSON.stringify(GS));}catch{}};

function toast(msg,dur=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}

function updateHUD(){
  const pct=Math.min(100,(GS.xp%1000)/10);
  document.getElementById('xpfill').style.height=pct+'%';
  document.getElementById('xpnum').textContent=GS.xp+' XP';
  document.getElementById('xp-top').textContent=GS.xp;
  document.getElementById('streak-top').textContent='🔥'+GS.streak;
  document.getElementById('done-top').textContent=GS.done.length+'/10';
}

function buildSB(){
  const c=document.getElementById('sb-levels');
  c.innerHTML='';
  for(let i=1;i<=10;i++){
    const done=GS.done.includes(i);
    const locked=i>1&&!GS.done.includes(i-1);
    const d=document.createElement('button');
    d.className='lvl-dot'+(done?' done':locked?' locked':'');
    d.id='lbtn'+i;
    d.innerHTML=`<span class="di">${ICONS[i-1]}</span><span class="dn">${i}</span>`;
    d.onclick=locked?()=>toast('🔒 Complete level '+(i-1)+' first'):()=>showLevel(i);
    if(i===5) c.appendChild(Object.assign(document.createElement('div'),{className:'sb-div'}));
    c.appendChild(d);
  }
}

// ── QUIZ ENGINE ──────────────────────────────────
const QS={};
function initQ(id){if(!QS[id])QS[id]={a:{},score:0,done:false};}
function pick(lvl,qi,sel){
  if(QS[lvl]?.done||QS[lvl]?.a[qi]!==undefined)return;
  const q=QUIZZES[lvl][qi];
  QS[lvl].a[qi]=sel;
  const ok=sel===q.a;
  if(ok){QS[lvl].score++;GS.xp+=10;save();updateHUD();toast('✅ +10 XP');}
  else toast('❌ Wrong — see explanation');
  document.querySelectorAll(`#q${lvl}_${qi} .opt`).forEach((b,i)=>{
    b.classList.add('disabled');
    if(i===q.a)b.classList.add('correct');
    else if(i===sel)b.classList.add('wrong');
  });
  const e=document.getElementById(`exp${lvl}_${qi}`);
  if(e)e.classList.add('show');
  if(Object.keys(QS[lvl].a).length===QUIZZES[lvl].length)finishQ(lvl);
}
function finishQ(lvl){
  QS[lvl].done=true;
  const s=QS[lvl].score,t=QUIZZES[lvl].length,pct=Math.round(s/t*100);
  const sc=document.getElementById('qs'+lvl);
  if(sc)sc.textContent=`Score: ${s}/${t} (${pct}%)`;
  if(pct>=70&&!GS.done.includes(lvl)){
    GS.done.push(lvl);GS.xp+=100;save();updateHUD();buildSB();
    setTimeout(()=>toast(`🏆 Level ${lvl} done! +100 XP 🎉`,3500),300);
    if(lvl<10)setTimeout(()=>{if(confirm(`Level ${lvl} complete! Go to Level ${lvl+1}?`))showLevel(lvl+1);},1500);
    else setTimeout(()=>toast('🌟 ALL 10 LEVELS COMPLETE! You are an AI expert!',5000),500);
  }else if(pct<70)toast(`${pct}% — Need 70% to unlock next level`,3000);
}
function qHTML(lvl){

function tokenize(v){
  const toks=(v.match(/\w+|[^\w\s]|\s+/g)||[]).filter(t=>t.trim()).reduce((a,t)=>{if(t.length>6){for(let i=0;i<t.length;i+=3)a.push(t.slice(i,i+3));}else a.push(t);return a;},[]);
  document.getElementById('tok-out').innerHTML=toks.map((t,i)=>`<div class="tok-wrap"><span class="tok t${(i%6)+1}">${t.replace(/</g,'&lt;')}</span><span class="tok-id">${1000+i}</span></div>`).join('');
  document.getElementById('tok-meta').textContent=`${toks.length} tokens · ~${Math.ceil(toks.length*4)} chars`;
}
function tempFx(v){
  document.getElementById('tv').textContent=parseFloat(v).toFixed(1);
  const t=parseFloat(v);
  let txt;
  if(t<=0.2)txt=`<strong style="color:var(--green)">Deterministic</strong> — Same input always gives same output. Best for facts, classification, extraction.`;
  else if(t<=0.7)txt=`<strong style="color:var(--amber)">Balanced</strong> — Slight variation. Good for summaries, analysis, code.`;
  else if(t<=1.2)txt=`<strong style="color:var(--orange)">Creative</strong> — Diverse outputs. Good for brainstorming, writing, ideation.`;
  else txt=`<strong style="color:var(--coral)">Chaotic</strong> — Highly unpredictable. High hallucination risk. Experimental only.`;
  document.getElementById('teff').innerHTML=txt;
}
function roiCalc(v){
  document.getElementById('rv').textContent=parseInt(v).toLocaleString();
  const n=parseInt(v),t=Math.round(n*14.5/60),c=Math.round(n*3.2);
  document.getElementById('roi-out').innerHTML=`⏱ <strong>${t.toLocaleString()} hrs</strong> saved/month &nbsp;·&nbsp; 💵 <strong>$${c.toLocaleString()}</strong> saved/month &nbsp;·&nbsp; 📈 <strong>$${(c*12).toLocaleString()}</strong>/year`;
}
